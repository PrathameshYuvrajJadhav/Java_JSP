<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disha Enquiry Form</title>

    <style>
        body {
            background-color: powderblue;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: navy;
        }

        form {
            background-color: white;
            width: 650px;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid navy;
            border-radius: 10px;
            box-shadow: 3px 3px 10px gray;
        }

        label {
            display: inline-block;
            width: 220px;
            text-align: left;
            font-weight: bold;
        }

        input {
            padding: 5px;
            margin-bottom: 10px;
        }

        button {
            background-color: navy;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <h1>Disha Enquiry Form</h1>

    <form action="run.jsp" method="get">

        <label>Date of Enquiry</label>
        <input type="datetime-local" name="pass">
        <br>

        <label>Name</label>
        <input type="text" name="uname" placeholder="Enter Name">
        <br>

        <label>Address</label>
        <input type="text" name="address" placeholder="Enter Address">
        <br>

        <label>Contact</label>
        <input type="tel" name="residence" placeholder="Enter Contact Number">
        <br>

        <label>Email</label>
        <input type="email" name="eid" placeholder="Enter Email">
        <br>

        <label>Date Of Birth</label>
        <input type="date" name="dob">
        <br>

        <label>Qualification</label>
        <input type="text" name="qualify" placeholder="Enter Qualification">
        <br>

        <label>Previous Knowledge of Computer</label>
        <input type="radio" name="computer" value="yes"> Yes
        <input type="radio" name="computer" value="no"> No
        <br>

        <label>If Yes, Please Specify</label>
        <input type="text" name="spec">
        <br>

        <label>How You Know About Disha</label>
        <input type="checkbox" name="disha" value="Students"> Students
        <br>

        <label></label>
        <input type="checkbox" name="disha" value="Hoardings"> Hoardings
        <br>

        <label></label>
        <input type="checkbox" name="disha" value="Newspaper"> Newspaper
        <br>

        <label></label>
        <input type="checkbox" name="disha" value="Other"> Other
        <input type="text" name="other">
        <br>

        <label>Interested In</label>
        <input type="text" name="course" placeholder="Course">
        <br>

        <label>Batch Timing</label>
        <input type="text" name="bt" placeholder="Batch Timing">
        <br><br>

        <button type="submit">Save</button>

    </form>

</body>
</html>
